    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Ingresos</title>
    <link rel="stylesheet" href="styles/ingresos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        
        <header class="top-bar-inner">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1>INGRESOS</h1>
        </header>

        <main class="main-content">
            <div class="form-group">
                <input type="number" id="cantidad-ingreso" placeholder="Ingresa la cantidad" min="0" step="0.01">
            </div>
            
            <div class="form-group">
                <input type="text" id="motivo-ingreso" placeholder="Ingresa el motivo">
            </div>

            <button id="btn-guardar-ingreso" class="save-btn" onclick="agregarIngreso()">Guardar Registro</button>

            <div class="btns-container">
                <button id="btn-historial" class="circle-btn" onclick="mostarHistoIngresos()">Historial</button>
                <button id="btn-clean" class="circle-btn" onclick="reiniciarHistorial()">Reiniciar Dia</button>
                <button id="btn-report" class="circle-btn" onclick="generarReporteIngresos()">Generar Reporte</button>
            </div>


            <div  id="historial-ingresos"  onclick="mostarHistoIngresos()"  >
                <!-- <button onclick="togglehisto()">CERRAR</button> -->

                <!-- <h1>este  es el historial</h1> -->
            </div>
        </main>

    </div>
    <script src="javascript/ingresos.js"></script>
</body>
</html>
